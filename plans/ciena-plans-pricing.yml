specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Ciena
providerId: ciena
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - MEF
  - Network Automation
  - Network Management
  - Optical
  - SDN
  - Telecom
  - TM Forum
description: Ciena does not publish list pricing for Blue Planet, MCP, or Emulation Cloud. Commercial
  pricing is quoted per project to telecom carriers and managed-service providers and bundles software
  licenses with hardware (optical and packet platforms), professional services, support, and term
  durations. Open APIs (TM Forum, MEF Legato / Sonata, ONAP) are included with the Blue Planet / MCP
  software entitlement; Emulation Cloud access for developer testing is free with developer-portal
  registration.
notes: No public pricing page is available. Tiers below describe the typical commercial structure
  rather than priced plans.
sources:
  - https://www.blueplanet.com/
  - https://www.ciena.com/products/blue-planet/
  - https://developer.ciena.com/
plans:
  - id: ciena-emulation-cloud
    name: Emulation Cloud (Developer Sandbox)
    type: freemium
    description: Free developer environment with full API definitions, tutorials, and sample code.
      Used to build and test applications against simulated Ciena platforms before purchasing a
      production license.
    entries:
      - label: Sandbox access
        name: sandbox_access
        type: flat
        metric: usage
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '$0 — registration required'
        userMultiplied: false
    elements:
      - name: Developer portal access
      - name: Full API definitions
      - name: Tutorials and sample code
      - name: Community forums
  - id: ciena-blue-planet-mcp-license
    name: Blue Planet / MCP License
    type: enterprise
    description: Commercial software license for production use of the Blue Planet automation suite
      and / or MCP NMS. APIs are included; pricing is project-quoted and typically bundled with
      hardware, support, and professional services.
    entries:
      - label: Software license
        name: software_license
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact Ciena sales
        userMultiplied: false
      - label: API access
        name: api_access
        type: flat
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included with license
        userMultiplied: false
      - label: Support
        name: support
        type: subscription
        metric: month
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: tiered (Standard / Premium / 24x7)
        userMultiplied: false
    elements:
      - name: TM Forum Open APIs
      - name: MEF LSO Legato and Sonata APIs
      - name: ONAP-aligned policy controls
      - name: Topology, provisioning, and performance APIs
      - name: NETCONF / RESTCONF interfaces (MCP)
      - name: Vendor support and SLAs
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
