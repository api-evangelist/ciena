description: 'FOCUS-aligned FinOps for Ciena: telecom-vendor capex + opex shape. Network operators
  pay for hardware (optical / packet platforms), perpetual or term software licenses (Blue Planet,
  MCP), support, and professional services. APIs are bundled into the software entitlement and not
  separately metered.'
notes: Ciena does not expose a per-API metered billing surface. The FinOps shape below reflects the
  carrier-vendor commercial structure.
sources:
  - https://www.ciena.com/
  - https://www.blueplanet.com/
