meters:
  - name: software_license
    description: Blue Planet or MCP software license line items
    unit: license-year
    aggregation: sum
    dimensions:
      - product
      - sku
  - name: hardware_capex
    description: Optical and packet platform hardware purchases
    unit: chassis
    aggregation: sum
    dimensions:
      - platform
      - site
  - name: support_subscription
    description: Annual support and maintenance contract
    unit: month
    aggregation: sum
    dimensions:
      - tier
      - product
  - name: professional_services
    description: Implementation, integration, and customization services
    unit: hour
    aggregation: sum
    dimensions:
      - project
principles:
  - name: Visibility
    description: Track Ciena spend through purchase orders, hardware asset registers, software
      entitlement records in the Ciena customer portal, and annual support invoices.
  - name: Allocation
    description: Allocate hardware and license cost to network domains (metro, long-haul, DCI) and
      service products (Ethernet, wavelength, IP transit) so each carrier service line carries its
      vendor cost.
  - name: Optimization
    description: Align refresh cycles with network growth, negotiate multi-year support, consolidate
      management on MCP / Blue Planet to reduce OSS sprawl, and use Emulation Cloud to validate
      automation before paying for production licenses.
  - name: Accountability
    description: Network engineering owns design and capacity; operations owns MCP / Blue Planet
      runtime; supply chain and finance own purchase orders and asset lifecycle.
