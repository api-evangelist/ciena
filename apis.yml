aid: ciena
name: Ciena
description: >-
  Ciena Corporation is a global networking equipment, software, and services
  vendor focused on optical and packet networking, SDN, and service automation.
  This index covers Ciena's open APIs across the Blue Planet automation
  platform, the Ciena MCP (Manage, Control, and Plan) NMS, and the Emulation
  Cloud developer environment, exposing TM Forum Open APIs, MEF Lifecycle
  Service Orchestration (LSO) APIs (Legato, Sonata), and ONAP-aligned policy
  controls for telecom carriers and managed service providers.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
