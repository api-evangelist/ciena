    type: Contact
  - url: https://raw.githubusercontent.com/api-evangelist/ciena/refs/heads/main/openapi/ciena-blue-planet-openapi.yml
    type: OpenAPI
  description: >-
    Ciena Blue Planet provides open APIs for multi-layer SDN network management and automation. The platform supports TM Forum Open APIs, MEF Lifecycle Service Orchestration (LSO) APIs including Legato and Sonata, and integrates with ONAP policy frameworks. APIs enable network topology management, circuit provisioning, performance monitoring, and network operations automation for telecom carriers.
- aid: ciena:mcp-api
  name: Ciena MCP (Manage, Control and Plan) API
  tags:
  - Telecom
  - SDN
  - Network Management
  - RESTCONF
  - NETCONF
  image: https://raw.githubusercontent.com/api-evangelist/ciena/refs/heads/main/image.png
  humanURL: https://software.ciena.com/releasenotes/MCP-DOCS_5.2-217/build/site/mcp-docs/user-guide/Overview.html
  baseURL: https://api.ciena.com
  properties:
  - url: https://software.ciena.com/releasenotes/MCP-DOCS_5.2-217/build/site/mcp-docs/user-guide/Overview.html
    type: Documentation
  description: >-
    Ciena's Manage, Control and Plan (MCP) is a multi-layer Software Defined Networking (SDN) and Network Management System (NMS) platform. The MCP REST and RESTCONF APIs enable network-aware management operations for optical and packet networks including topology discovery, circuit provisioning, and performance data retrieval.
- aid: ciena:emulation-cloud-api
  name: Ciena Emulation Cloud API
  tags:
  - Telecom
  - Developer Tools
  - Testing
  - SDN
  image: https://raw.githubusercontent.com/api-evangelist/ciena/refs/heads/main/image.png
