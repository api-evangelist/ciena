naftiko: 1.0.0-alpha2
info:
  label: Ciena Blue Planet Open API — Performance
  description: 'Ciena Blue Planet Open API — Performance. 1 operations. Lead operation: Retrieve network performance metrics.
    Self-contained Naftiko capability covering one Ciena business surface.'
  tags:
  - Ciena
  - Performance
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CIENA_API_KEY: CIENA_API_KEY
capability:
  consumes:
  - type: http
    namespace: blue-planet-performance
    baseUri: https://api.blueplanet.com/bpocore/market/api/v1
    description: Ciena Blue Planet Open API — Performance business capability. Self-contained, no shared references.
    resources:
    - name: performance-metrics
      path: /performance/metrics
      operations:
      - name: getperformancemetrics
        method: GET
        description: Retrieve network performance metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resourceId
          in: query
          type: string
          description: ID of the network resource to query metrics for
          required: true
        - name: metricType
          in: query
          type: string
          description: Type of performance metric
        - name: granularity
          in: query
          type: string
          description: Data granularity period
        - name: startTime
          in: query
          type: string
          description: Start of query window (ISO 8601)
        - name: endTime
          in: query
          type: string
          description: End of query window (ISO 8601)
    authentication:
      type: bearer
      token: '{{env.CIENA_API_KEY}}'
  exposes:
  - type: rest
    namespace: blue-planet-performance-rest
    port: 8080
    description: REST adapter for Ciena Blue Planet Open API — Performance. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/performance/metrics
      name: performance-metrics
      description: REST surface for performance-metrics.
      operations:
      - method: GET
        name: getperformancemetrics
        description: Retrieve network performance metrics
        call: blue-planet-performance.getperformancemetrics
        with:
          resourceId: rest.resourceId
          metricType: rest.metricType
          granularity: rest.granularity
          startTime: rest.startTime
          endTime: rest.endTime
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: blue-planet-performance-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ciena Blue Planet Open API — Performance. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: retrieve-network-performance-metrics
      description: Retrieve network performance metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: blue-planet-performance.getperformancemetrics
      with:
        resourceId: tools.resourceId
        metricType: tools.metricType
        granularity: tools.granularity
        startTime: tools.startTime
        endTime: tools.endTime
      outputParameters:
      - type: object
        mapping: $.
