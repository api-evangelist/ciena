naftiko: 1.0.0-alpha2
info:
  label: Ciena Blue Planet Open API
  description: 'Ciena Blue Planet Open API. 4 operations. Lead operation: List provisioned network services. Self-contained
    Naftiko capability covering one Ciena business surface.'
  tags:
  - Ciena
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CIENA_API_KEY: CIENA_API_KEY
capability:
  consumes:
  - type: http
    namespace: blue-planet-general
    baseUri: https://api.blueplanet.com/bpocore/market/api/v1
    description: Ciena Blue Planet Open API business capability. Self-contained, no shared references.
    resources:
    - name: services
      path: /services
      operations:
      - name: listservices
        method: GET
        description: List provisioned network services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: query
          type: string
          description: Filter by service state
        - name: serviceType
          in: query
          type: string
          description: Filter by service type
        - name: limit
          in: query
          type: integer
      - name: createservice
        method: POST
        description: Create a new network service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: services-serviceId
      path: /services/{serviceId}
      operations:
      - name: getservice
        method: GET
        description: Get network service details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: serviceId
          in: path
          type: string
          required: true
      - name: deleteservice
        method: DELETE
        description: Delete a network service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: serviceId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.CIENA_API_KEY}}'
  exposes:
  - type: rest
    namespace: blue-planet-general-rest
    port: 8080
    description: REST adapter for Ciena Blue Planet Open API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/services
      name: services
      description: REST surface for services.
      operations:
      - method: GET
        name: listservices
        description: List provisioned network services
        call: blue-planet-general.listservices
        with:
          state: rest.state
          serviceType: rest.serviceType
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createservice
        description: Create a new network service
        call: blue-planet-general.createservice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/services/{serviceid}
      name: services-serviceid
      description: REST surface for services-serviceId.
      operations:
      - method: GET
        name: getservice
        description: Get network service details
        call: blue-planet-general.getservice
        with:
          serviceId: rest.serviceId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteservice
        description: Delete a network service
        call: blue-planet-general.deleteservice
        with:
          serviceId: rest.serviceId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: blue-planet-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ciena Blue Planet Open API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-provisioned-network-services
      description: List provisioned network services
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: blue-planet-general.listservices
      with:
        state: tools.state
        serviceType: tools.serviceType
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-network-service
      description: Create a new network service
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: blue-planet-general.createservice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-network-service-details
      description: Get network service details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: blue-planet-general.getservice
      with:
        serviceId: tools.serviceId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-network-service
      description: Delete a network service
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: blue-planet-general.deleteservice
      with:
        serviceId: tools.serviceId
      outputParameters:
      - type: object
        mapping: $.
