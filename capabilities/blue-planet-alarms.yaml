naftiko: 1.0.0-alpha2
info:
  label: Ciena Blue Planet Open API — Alarms
  description: 'Ciena Blue Planet Open API — Alarms. 1 operations. Lead operation: List network alarms. Self-contained Naftiko
    capability covering one Ciena business surface.'
  tags:
  - Ciena
  - Alarms
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CIENA_API_KEY: CIENA_API_KEY
capability:
  consumes:
  - type: http
    namespace: blue-planet-alarms
    baseUri: https://api.blueplanet.com/bpocore/market/api/v1
    description: Ciena Blue Planet Open API — Alarms business capability. Self-contained, no shared references.
    resources:
    - name: alarms
      path: /alarms
      operations:
      - name: listalarms
        method: GET
        description: List network alarms
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: severity
          in: query
          type: string
          description: Filter by alarm severity
        - name: resourceId
          in: query
          type: string
          description: Filter alarms for a specific resource
        - name: limit
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.CIENA_API_KEY}}'
  exposes:
  - type: rest
    namespace: blue-planet-alarms-rest
    port: 8080
    description: REST adapter for Ciena Blue Planet Open API — Alarms. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/alarms
      name: alarms
      description: REST surface for alarms.
      operations:
      - method: GET
        name: listalarms
        description: List network alarms
        call: blue-planet-alarms.listalarms
        with:
          severity: rest.severity
          resourceId: rest.resourceId
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: blue-planet-alarms-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ciena Blue Planet Open API — Alarms. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-network-alarms
      description: List network alarms
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: blue-planet-alarms.listalarms
      with:
        severity: tools.severity
        resourceId: tools.resourceId
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
